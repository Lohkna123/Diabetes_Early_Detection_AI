<!DOCTYPE html>
<html>
<head>
    <title>Patient History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background: #667eea;
            color: white;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Patient History</h2>
        <table>
            <thead>
                <tr><th>ID</th><th>Patient ID</th><th>Age</th><th>Gender</th><th>Prediction</th><th>Risk %</th><th>Date</th></tr>
            </thead>
            <tbody>
                {% for row in data %}
                <tr>
                    <td>{{ row[0] }}</td>
                    <td>{{ row[1] }}</td>
                    <td>{{ row[10] }}</td>
                    <td>{{ row[2] }}</td>
                    <td>{{ row[11] }}</td>
                    <td>{{ "%.1f"|format(row[12]) }}%</td>
                    <td>{{ row[13] }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn">Back</a>
    </div>
</body>
</html>
