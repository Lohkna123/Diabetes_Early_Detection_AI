<!DOCTYPE html>
<html>
<head>
    <title>Diabetes Predictor</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #5a67d8;
        }
        .btn {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🏥 Diabetes Risk Prediction</h2>
        <form action="/predict" method="POST">
            <input type="text" name="patient_id" placeholder="Patient ID" required>
            <input type="number" name="age" placeholder="Age" required>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option>Male</option>
                <option>Female</option>
            </select>
            <input type="number" name="Pregnancies" placeholder="Pregnancies" step="any" required>
            <input type="number" name="Glucose" placeholder="Glucose" step="any" required>
            <input type="number" name="BloodPressure" placeholder="Blood Pressure" step="any" required>
            <input type="number" name="SkinThickness" placeholder="Skin Thickness" step="any" required>
            <input type="number" name="Insulin" placeholder="Insulin" step="any" required>
            <input type="number" name="BMI" placeholder="BMI" step="any" required>
            <input type="number" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" step="any" required>
            <button type="submit">Predict</button>
        </form>
        <a href="/history" class="btn">View History</a>
        <a href="/model_performance" class="btn">Model Performance</a>
    </div>
</body>
</html>
